defaults:
  - env: dmc_vision
  - model: size12M
  - subexp: none
  # Disable Hydra's Python logging-to-file (train.log)
  - override hydra/job_logging: disabled
  - _self_

logdir: logdir/${now:%Y-%m-%d}/${now:%H-%M-%S}
seed: 0
deterministic_run: False
device: 'cuda:0'
# Optional practical resume path. This restores model + optimizer state and
# continues the global trainer step from the checkpoint's trainer_step. Replay
# buffer / env worker state are not restored.
resume_checkpoint: null
resume_load_optim: True
resume_strict: True

hydra:
  run:
    dir: ${logdir}

batch_size: 16
batch_length: 64

buffer:
  batch_size: ${batch_size}
  batch_length: ${batch_length}
  max_size: 5e5
  device: ${device}
  storage_device: 'cuda:0'
  sampling:
    strategy: uniform # uniform|dfs
    dfs:
      alpha: 1.0
      beta: 0.0
      eps: 1e-8
      world_temperature: 1.0
      policy_temperature: 1.0
      priority_clip: 50.0

trainer:
  steps: ${env.steps}
  pretrain: 0
  burn_in: 0
  eval_every: 1e4
  eval_episode_num: ${env.eval_episode_num}
  batch_size: ${batch_size}
  batch_length: ${batch_length}
  train_ratio: ${env.train_ratio}
  video_pred_log: False
  params_hist_log: False
  update_log_every: 5e3
  # Save latest.pt plus numbered checkpoints every N trainer steps. Set to 0
  # to disable periodic checkpoints while keeping the final latest.pt save.
  checkpoint_every: 1e5
  checkpoint_keep_all: True
  action_repeat: ${env.action_repeat}
