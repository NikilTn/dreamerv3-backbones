act_entropy: 3e-4
kl_free: 1.0
imag_horizon: 15
horizon: 333
lamb: 0.95
compile: True
log_grads: False
device: ${device}
rep_loss: "r2dreamer" # r2dreamer/dreamer/infonce/dreamerpro
backbone: "gru" # gru/rssm/transformer/storm/mamba/mamba2/s4/s3m/s5

lr: 4e-5
agc: 0.3
pmin: 1e-3
eps: 1e-20
beta1: 0.9
beta2: 0.999
warmup: 1000
slow_target_update: 1
slow_target_fraction: 0.02

loss_scales:
  barlow: 0.05
  cpc: 1.0
  infonce: 1.0
  recon: 1.0
  rew: 1.0
  con: 1.0
  dyn: 1.0
  rep: 0.1
  policy: 1.0
  value: 1.0
  repval: 0.3
  swav: 1.0
  temp: 1.0
  norm: 1.0

r2dreamer:
  lambd: 5e-4

dreamer_pro:
  warm_up: 1
  num_prototypes: 2500
  proto_dim: 32
  temperature: 0.1
  sinkhorn_eps: 0.05
  sinkhorn_iters: 3
  ema_update_every: 1
  ema_update_fraction: 0.05
  freeze_prototypes_iters: 10000
  aug:
    max_delta: 3.0
    same_across_time: True
    bilinear: True

cpc:
  enabled: False
  horizon: 3
  proj_dim: ${model.units}
  hidden_dim: ${model.units}
  temperature: 0.1
  aug:
    max_delta: 3.0
    same_across_time: True
    bilinear: True

rssm:
  stoch: 32
  deter: ${model.deter}
  hidden: ${model.hidden}
  discrete: ${model.discrete}
  img_layers: 2
  obs_layers: 1
  dyn_layers: 1
  blocks: 8
  act: ${model.act}
  norm: ${model.norm}
  unimix_ratio: 0.01
  initial: 'learned'
  device: ${device}

transformer:
  tokens: 8
  layers: 2
  heads: 4
  ff_mult: 4
  # Phase 2a (Transformer-XL): per-layer attention context length.
  # Defaults to `tokens` so a bare config preserves the historical short-memory
  # behavior. Bump (e.g. 128) for paper-faithful long-memory transformer runs.
  cache_length: 8

mamba:
  tokens: 8
  layers: 2
  expand: 2
  conv_kernel: 3
  # Phase 2b (Mamba-2 SSD selective scan, Dao & Gu ICML 2024 — proposal §3.2
  # cited as reference [5]). The SSM is multi-head: each of `nheads` heads
  # has a single scalar A and operates on `headdim = (expand * deter / tokens)
  # / nheads` channels. State shape per layer is
  # `(B, nheads, headdim, state_size)`.
  # Constraint: `expand * deter / tokens` must be divisible by `nheads`.
  state_size: 64   # paper-typical d_state for Mamba-2 (official default 128)
  nheads: 8        # Mamba-2 default head count

s4:
  tokens: 8
  layers: 2
  state_size: 64

s5:
  tokens: 8
  layers: 2
  heads: 4
  state_size: 32

encoder:
  mlp_keys: ${env.encoder.mlp_keys}
  cnn_keys: ${env.encoder.cnn_keys}
  mlp:
    shape: null
    layers: 3
    units: ${model.units}
    act: ${model.act}
    norm: ${model.norm}
    device: ${device}
    outscale: null
    symlog_inputs: True
    name: 'mlp_encoder'
  cnn:
    act: ${model.act}
    norm: ${model.norm}
    kernel_size: 5
    minres: 4
    depth: ${model.depth}
    mults: [2, 3, 4, 4]

decoder:
  mlp_keys: ${env.decoder.mlp_keys}
  cnn_keys: ${env.decoder.cnn_keys}
  mlp_dist:
    name: 'symlog_mse'
  cnn_dist:
    name: 'mse'
  mlp:
    shape: null
    layers: 3
    units: ${model.units}
    act: ${model.act}
    norm: ${model.norm}
    dist:
      name: 'identity'
    device: ${device}
    outscale: 1.0
    symlog_inputs: False
    name: 'mlp_decoder'
  cnn:
    depth: ${model.depth}
    units: ${model.units}
    bspace: 8
    mults: [2, 3, 4, 4]
    act: ${model.act}
    norm: ${model.norm}
    kernel_size: 5
    minres: 4
    outscale: 1.0

reward:
  shape: [255,]
  layers: 1
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  dist:
    name: 'symexp_twohot'
    bin_num: 255
  outscale: 0.0
  device: ${device}
  symlog_inputs: False
  name: 'reward'

cont:
  shape: [1,]
  layers: 1
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  dist:
    name: 'binary'
  outscale: 1.0
  device: ${device}
  symlog_inputs: False
  name: 'cont'

actor:
  shape: null
  layers: 3
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  device: ${device}
  dist:
    cont:
      name: 'bounded_normal'
      min_std: 0.1
      max_std: 1.0
    disc:
      name: 'onehot'
      unimix_ratio: 0.01
    multi_disc:
      name: 'multi_onehot'
      unimix_ratio: 0.01
  outscale: 0.01
  symlog_inputs: False
  name: 'actor'

critic:
  shape: [255,]
  layers: 3
  units: ${model.units}
  act: ${model.act}
  norm: ${model.norm}
  device: ${device}
  dist:
    name: 'symexp_twohot'
    bin_num: 255
  outscale: 0.0
  symlog_inputs: False
  name: 'value'
